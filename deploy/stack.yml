# Docker Swarm stack — deployed by GitHub Actions (.github/workflows/cicd.yml).
# Runs as an ADDITIONAL stack on the existing 3-node Swarm. Single env (prod),
# published on port 1111. Env vars are injected by the workflow from GH secrets.
services:
  app:
    image: ${IMAGE}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      PORT: "80"
      APP_ENV: ${APP_ENV:-prod}
    ports:
      - "${PORT:-1111}:80"
    healthcheck:
      # node is guaranteed present in the image — more robust than wget/curl.
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:80/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 45s
    deploy:
      replicas: 2
      update_config:
        order: start-first       # new instance up BEFORE old stops → zero downtime
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
      rollback_config:
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
