name: CI/CD

# Single environment: push to main → build image (ghcr) → deploy stack "slopfeed"
# onto the existing 3-node Swarm, published on port 1111. No dev/stage.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: [self-hosted, swarm]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Deploy stack (rolling update)
        env:
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          PORT: "1111"
          STACK: slopfeed
          APP_ENV: prod
        run: docker stack deploy --with-registry-auth --detach=false -c deploy/stack.yml "$STACK"
      - name: Verify
        env:
          STACK: slopfeed
        run: |
          sleep 5
          docker service ls --filter name="${STACK}"
          docker service ps "${STACK}_app" --no-trunc | head -5
          echo "===== FAILED task startup logs (crash diagnostics) ====="
          FAILED=$(docker service ps "${STACK}_app" --no-trunc --format '{{.ID}} {{.CurrentState}}' | grep -i 'Failed' | head -1 | awk '{print $1}')
          echo "failed task: ${FAILED:-<none>}"
          if [ -n "$FAILED" ]; then docker service logs --raw "$FAILED" 2>&1 | tail -60 || true; fi
